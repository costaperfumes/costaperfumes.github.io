<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Costa Perfumes</title>

<style>
body{margin:0;background:black;font-family:Arial, sans-serif;overflow:hidden}
.video-bg{position:fixed;width:100%;height:100%;object-fit:cover;z-index:-2}
.overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:-1}

.contenido{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;color:white;opacity:0;transition:opacity 1.5s ease}

.titulo{font-size:2.5rem;letter-spacing:2px}
.subtitulo{margin-top:5px;color:rgba(255,255,255,.7)}

.categoria{margin-top:30px;padding:18px 30px;background:rgba(255,255,255,.15);border-radius:15px;cursor:pointer}

.btn-main{margin-top:20px;padding:12px 25px;background:#93BBE1;color:black;border-radius:30px;text-decoration:none;font-weight:bold}

.ruleta-container{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);display:flex;flex-direction:column;justify-content:center;align-items:center;opacity:0;pointer-events:none;transition:.3s}
.ruleta-container.active{opacity:1;pointer-events:all}

.puntero{width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-top:25px solid #93BBE1;margin-bottom:10px}

.ruleta{width:260px;height:260px;border-radius:50%;position:relative;
background:conic-gradient(#93BBE1 0deg 90deg,#fff 90deg 180deg,#93BBE1 180deg 270deg,#fff 270deg 360deg);
box-shadow:0 0 40px rgba(147,187,225,.6), inset 0 0 20px rgba(0,0,0,.3);
transition:transform 3.5s cubic-bezier(.2,.8,.2,1);
}

.label{position:absolute;top:50%;left:50%;transform-origin:0 0;font-weight:bold;font-size:13px;text-shadow:0 2px 6px rgba(0,0,0,.8)}
.label span{display:block;width:90px;text-align:center;transform:translate(-50%,-90%) rotate(90deg);line-height:1.05}

.l1{transform:rotate(45deg) translateY(-95px)}
.l2{transform:rotate(135deg) translateY(-95px)}
.l3{transform:rotate(225deg) translateY(-95px)}
.l4{transform:rotate(315deg) translateY(-95px)}

.resultado{color:white;margin-top:20px;text-align:center}
.claim-btn{margin-top:10px;padding:10px 20px;border-radius:25px;background:#93BBE1;border:none;font-weight:bold;cursor:pointer}
</style>
</head>

<body>

<video autoplay muted loop playsinline class="video-bg" id="bgVideo">
<source src="assets/video/playa.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="contenido" id="contenido">
<h1 class="titulo">Costa Perfumes</h1>
<p class="subtitulo">Perfumes originales · La Serena</p>
<div class="categoria" onclick="abrirRuleta()">🎯 Participa y gana</div>
<a href="https://instagram.com/costaperfumeslaserenacl" target="_blank" class="btn-main">Comprar por Instagram</a>
</div>

<div class="ruleta-container" id="ruletaContainer">
<div class="puntero"></div>
<div class="ruleta" id="ruleta">
<div class="label l1"><span>$20.000</span></div>
<div class="label l2"><span>5%</span></div>
<div class="label l3"><span>10%</span></div>
<div class="label l4"><span>Sigue<br>participando</span></div>
</div>
<div class="resultado" id="resultado"></div>
</div>

<script>
const video=document.getElementById('bgVideo');
const contenido=document.getElementById('contenido');
video.addEventListener('playing',()=>{contenido.style.opacity=1});

function abrirRuleta(){
const c=document.getElementById('ruletaContainer');
const r=document.getElementById('resultado');
r.innerHTML=`
<p>Síguenos en Instagram para participar</p>
<button class="claim-btn" onclick="irInstagram()">Seguir</button><br><br>
<button class="claim-btn" onclick="girarRuleta()">Ya seguí</button>`;
c.classList.add('active');
}

function girarRuleta(){
const ruleta=document.getElementById('ruleta');
const resultado=document.getElementById('resultado');

const premios=[
{t:'$20.000',p:0.00001},
{t:'5%',p:0.005},
{t:'10%',p:0.0025},
{t:'Sigue participando',p:0.99249}
];

let r=Math.random(),a=0,sel=premios[3];
for(let i of premios){a+=i.p;if(r<=a){sel=i;break}}

const idx=premios.indexOf(sel);
const grados=360*6+(idx*90)+45;
ruleta.style.transform=`rotate(${grados}deg)`;

setTimeout(()=>{
resultado.innerHTML=`Ganaste: ${sel.t}<br>
<button class="claim-btn" onclick="irInstagram()">Reclamar</button>`;
},3500);
}

function irInstagram(){
window.open('https://instagram.com/costaperfumeslaserenacl','_blank')
}

document.getElementById('ruletaContainer').onclick=function(e){
if(e.target.id==='ruletaContainer'){this.classList.remove('active')}}
</script>

</body>
</html>
