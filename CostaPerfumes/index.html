<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Costa Perfumes</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline class="video-bg" id="videoBg">
  <source src="assets/video/playa.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- CONTENIDO -->
<div class="contenido" id="contenido">
  <h1 class="titulo">Costa Perfumes</h1>

  <button class="btn" onclick="abrirRuleta()">
    Participa y gana
  </button>
</div>

<!-- RULETA -->
<div class="ruleta-container" id="ruletaContainer">
  <div class="ruleta-box">

    <div class="puntero"></div>

    <div class="ruleta" id="ruleta"></div>

    <button class="btn girar-btn" onclick="girarRuleta()">
      Girar
    </button>

    <div id="resultado"></div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
