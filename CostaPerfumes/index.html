<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Costa Perfumes</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  overflow: hidden;
  color: white;
}

/* VIDEO */
.video-bg {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: blur(6px) brightness(0.5);
  transform: scale(1.1);
  z-index: -2;
}

/* OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

/* CONTENIDO */
.contenido {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 30px;
}

h1 {
  font-size: 2.5rem;
}

/* BOTÓN */
.btn {
  padding: 12px 28px;
  background: #93BBE1;
  border: none;
  border-radius: 30px;
  font-weight: bold;
  cursor: pointer;
}

/* MODAL */
.caja-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);

  display: flex;
  justify-content: center;
  align-items: center;

  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}

.caja-container.active {
  opacity: 1;
  pointer-events: all;
}

/* CAJA */
.caja {
  width: 150px;
  height: 150px;
  background: #93BBE1;
  border-radius: 15px;
  box-shadow: 0 0 40px rgba(147,187,225,0.7);
  margin-bottom: 20px;
}

/* RESULTADO */
#resultado {
  margin-top: 15px;
  text-align: center;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline class="video-bg">
  <source src="assets/video/playa.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- CONTENIDO -->
<div class="contenido">
  <h1>Costa Perfumes</h1>
  <button class="btn" onclick="abrirCaja()">Abrir caja misteriosa</button>
</div>

<!-- CAJA -->
<div class="caja-container" id="cajaContainer">
  <div>

    <div class="caja"></div>

    <button class="btn" onclick="abrirPremio()">Abrir</button>
    <button class="btn" onclick="cerrarCaja()">Cerrar</button>

    <div id="resultado"></div>

  </div>
</div>

<script>
// PREMIOS
const premios = [
  { nombre: "Sigue participando", prob: 60 },
  { nombre: "5% OFF", prob: 25 },
  { nombre: "10% OFF", prob: 10 },
  { nombre: "$20.000", prob: 5 }
];

let abierta = false;

// ABRIR
function abrirCaja() {
  document.getElementById("cajaContainer").classList.add("active");
}

// CERRAR
function cerrarCaja() {
  document.getElementById("cajaContainer").classList.remove("active");
  document.getElementById("resultado").innerHTML = "";
  abierta = false;
}

// PREMIO
function abrirPremio() {
  if (abierta) return;
  abierta = true;

  let rand = Math.random() * 100;
  let acumulado = 0;
  let premio = premios[0];

  for (let p of premios) {
    acumulado += p.prob;
    if (rand <= acumulado) {
      premio = p;
      break;
    }
  }

  document.getElementById("resultado").innerHTML =
    "<h2>" + premio.nombre + "</h2>" +
    "<button class='btn' onclick='irInstagram()'>Reclamar</button>";
}

// INSTAGRAM
function irInstagram() {
  window.open("https://www.instagram.com/costaperfumeslaserenacl", "_blank");
}
</script>

</body>
</html>
