<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Costa Perfumes</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  overflow: hidden;
  color: white;
}

/* VIDEO */
video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: blur(6px) brightness(0.55);
  transform: scale(1.1);
  z-index: -2;
  opacity: 0;
  transition: 1.2s ease;
}

video.visible {
  opacity: 1;
}

/* OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.55);
  z-index: -1;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 25px;

  opacity: 0;
  transform: translateY(20px);
  transition: 1s ease;
}

.hero.visible {
  opacity: 1;
  transform: translateY(0);
}

h1 {
  font-size: 2.5rem;
  letter-spacing: 2px;
}

/* BOTONES */
.btn {
  padding: 12px 28px;
  background: #93BBE1;
  border: none;
  border-radius: 30px;
  font-weight: bold;
  cursor: pointer;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);

  display: flex;
  justify-content: center;
  align-items: center;

  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}

.modal.active {
  opacity: 1;
  pointer-events: all;
}

/* CAJA */
.box {
  text-align: center;
}

.cube {
  width: 150px;
  height: 150px;
  background: #93BBE1;
  border-radius: 16px;
  margin: 0 auto 20px auto;
  box-shadow: 0 0 40px rgba(147,187,225,0.7);
  transition: transform 0.6s ease;
}

/* RESULTADO */
#result {
  margin-top: 15px;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline id="bgVideo">
  <source src="assets/video/playa.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- HERO -->
<div class="hero" id="hero">
  <h1>Costa Perfumes</h1>
  <button class="btn" id="openBtn">Caja misteriosa</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="box">

    <div class="cube" id="cube"></div>

    <button class="btn" id="openReward">Abrir</button>
    <button class="btn" id="closeBtn">Cerrar</button>

    <div id="result"></div>

  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const video = document.getElementById("bgVideo");
  const hero = document.getElementById("hero");
  const modal = document.getElementById("modal");
  const cube = document.getElementById("cube");
  const result = document.getElementById("result");

  let used = false;

  // FADE IN
  setTimeout(() => {
    video.classList.add("visible");
    hero.classList.add("visible");
  }, 300);

  // OPEN
  document.getElementById("openBtn").addEventListener("click", () => {
    modal.classList.add("active");
  });

  // CLOSE
  document.getElementById("closeBtn").addEventListener("click", () => {
    modal.classList.remove("active");
    result.innerHTML = "";
    cube.style.transform = "scale(1)";
    used = false;
  });

  // PRIZES
  const prizes = [
    { name: "Sigue participando", chance: 60 },
    { name: "5% OFF", chance: 25 },
    { name: "10% OFF", chance: 10 },
    { name: "$20.000", chance: 5 }
  ];

  // OPEN REWARD
  document.getElementById("openReward").addEventListener("click", () => {

    if (used) return;
    used = true;

    cube.style.transform = "scale(1.2) rotate(5deg)";

    let r = Math.random() * 100;
    let acc = 0;
    let win = prizes[0];

    for (let p of prizes) {
      acc += p.chance;
      if (r <= acc) {
        win = p;
        break;
      }
    }

    setTimeout(() => {

      const isLose = win.name === "Sigue participando";

      if (isLose) {
        result.innerHTML = `
          <h2 style="opacity:0.8">${win.name}</h2>
          <p style="opacity:0.6; font-size:14px;">Intenta nuevamente más tarde</p>
        `;
        return;
      }

      result.innerHTML = `
        <h2>${win.name}</h2>
        <button class="btn" onclick="window.open('https://www.instagram.com/costaperfumeslaserenacl','_blank')">
          Reclamar
        </button>
      `;

    }, 600);

  });

});
</script>

</body>
</html>
