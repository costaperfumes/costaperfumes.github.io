<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Costa Perfumes</title>

  <link rel="stylesheet" href="styles.css">

  <style>
    body { background:black; }

    .titulo {
      position: absolute;
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.9);
      font-size: 2.5rem;
      letter-spacing: 2px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .subtitulo {
      margin-top: 10px;
      color: rgba(255,255,255,0.8);
      font-size: 1rem;
      text-align:center;
    }

    .categorias {
      margin-top: 40px;
    }

    .categoria {
      padding: 20px 30px;
      background: rgba(255,255,255,0.15);
      border-radius: 15px;
      backdrop-filter: blur(8px);
      cursor: pointer;
      color:white;
    }

    .btn-main {
      margin-top: 25px;
      padding: 14px 28px;
      border-radius: 40px;
      background: #FAFA00;
      text-decoration:none;
      color:black;
      font-weight:bold;
    }

    /* RULETA */

    .ruleta-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
      z-index: 50;
    }

    .ruleta-container.active {
      opacity: 1;
      pointer-events: all;
    }

    .puntero {
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 20px solid #FAFA00;
      margin-bottom: 10px;
    }

    .ruleta {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: conic-gradient(
        #FAFA00 0deg 72deg,
        #fff 72deg 144deg,
        #FAFA00 144deg 216deg,
        #fff 216deg 288deg,
        #FAFA00 288deg 360deg
      );
      transition: transform 3s ease-out;
    }

    .resultado {
      color:white;
      margin-top:20px;
      text-align:center;
    }

    .claim-btn {
      margin-top:15px;
      padding:10px 20px;
      border-radius:25px;
      background:#FAFA00;
      border:none;
      font-weight:bold;
      cursor:pointer;
    }

  </style>
</head>

<body>

  <video autoplay muted loop playsinline preload="auto" class="video-bg">
    <source src="assets/video/playa.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="contenido">
    <h1 class="titulo">Costa Perfumes</h1>
    <p class="subtitulo">Perfumes originales · Envíos a todo Chile</p>

    <div class="categorias">
      <div class="categoria" onclick="abrirRuleta()">
        🎯 Participa y gana
      </div>
    </div>

    <a href="https://instagram.com/costaperfumlaserenacl" target="_blank" class="btn-main">
      Comprar por Instagram
    </a>
  </div>

  <!-- RULETA -->
  <div class="ruleta-container" id="ruletaContainer">
    <div class="puntero"></div>
    <div class="ruleta" id="ruleta"></div>
    <div class="resultado" id="resultado"></div>
  </div>

  <script>
    const video = document.querySelector('.video-bg');
    video.style.opacity = 0;
    video.style.visibility = 'hidden';

    video.addEventListener('playing', () => {
      video.style.visibility = 'visible';
      video.style.transition = 'opacity 1.5s ease';
      video.style.opacity = 1;
    });

    function abrirRuleta() {
      const container = document.getElementById('ruletaContainer');
      const resultado = document.getElementById('resultado');

      resultado.innerHTML = `
        <p>Síguenos en Instagram para participar</p>
        <button class="claim-btn" onclick="irInstagram()">Seguir ahora</button>
        <br><br>
        <button class="claim-btn" onclick="girarRuleta()">Ya seguí, girar ruleta</button>
      `;

      container.classList.add('active');
    }

    function girarRuleta() {
      const ruleta = document.getElementById('ruleta');
      const resultado = document.getElementById('resultado');

      // premios con probabilidades reales
      const premios = [
        {texto:'$20.000', prob:0.00001},
        {texto:'5% OFF', prob:0.005},
        {texto:'10% OFF', prob:0.0025},
        {texto:'Sigue participando', prob:0.99249}
      ];

      // elegir premio según probabilidad
      const rand = Math.random();
      let acumulado = 0;
      let elegido = premios[3];

      for (let p of premios) {
        acumulado += p.prob;
        if (rand <= acumulado) {
          elegido = p;
          break;
        }
      }

      // índice visual (solo para giro)
      const index = premios.indexOf(elegido);
      const grados = 360 * 5 + (index * 90);

      ruleta.style.transform = `rotate(${grados}deg)`;

      setTimeout(() => {
        resultado.innerHTML = `
          Ganaste: ${elegido.texto} 🎉<br>
          <button class="claim-btn" onclick="irInstagram()">Reclamar premio</button><br><br>
          <button class="claim-btn" onclick="enviarMensaje('${elegido.texto}')">Enviar comprobante</button>
        `;
      }, 3000);
    }

    function enviarMensaje(premio) {
      const texto = encodeURIComponent(`Hola, gané ${premio} en la ruleta 🎯`);
      window.open(`https://instagram.com/costaperfumlaserenacl?text=${texto}`, '_blank');
    }

    function irInstagram() {
      window.open('https://instagram.com/costaperfumlaserenacl', '_blank');
    }

    document.getElementById('ruletaContainer').onclick = function(e) {
      if (e.target.id === 'ruletaContainer') {
        this.classList.remove('active');
      }
    }
  </script>

</body>
</html>
